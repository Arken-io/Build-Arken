<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>(function(){try{var t=localStorage.getItem('arken_theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Roadmap — BuildArken</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0A0B0D; --bg-raised: #111318; --border: #1E2128; --border-soft: #191C22;
    --text-1: #EDEEF1; --text-2: #9498A3; --text-3: #5A5E68;
    --accent: #45E0C6; --accent-dim: #45E0C633; --accent-ink: #06110F;
    --warn: #F0A23D; --warn-dim: #F0A23D26;
    --radius-s: 8px; --radius-m: 12px; --radius-l: 20px;
    --font-display: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  *{ box-sizing: border-box; margin:0; padding:0; }
  [data-theme="light"]{
    --bg: #FAFAFA; --bg-raised: #FFFFFF; --border: #E3E5E9; --border-soft: #ECEDF0;
    --text-1: #14161B; --text-2: #5B5F6B; --text-3: #9599A3;
    --accent: #0EA98C; --accent-dim: #0EA98C1f; --accent-ink: #FFFFFF;
  }
  html{ height: 100%; overflow: hidden; }
  body{ height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--bg); color: var(--text-1); font-family: var(--font-display); line-height: 1.5; -webkit-font-smoothing: antialiased; }
  a{ color: inherit; text-decoration: none; }
  .wrap{ max-width: 820px; margin: 0 auto; padding: 0 32px; }
  .nav{ position: sticky; top: 0; z-index: 50; background: rgba(10,11,13,0.72); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
  [data-theme="light"] .nav{ background: rgba(250,250,250,0.78); }
  .nav .wrap{ max-width: 1180px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
  .logo{ display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 16px; }
  .logo img{ border-radius: 6px; }

  main{ padding: 56px 0 96px; }
  .doc-header{ margin-bottom: 12px; text-align: center; }
  .doc-header h1{ font-size: clamp(28px, 4.5vw, 38px); font-weight: 800; letter-spacing: -0.02em; }
  .doc-header p{ color: var(--text-2); margin-top: 10px; font-size: 14.5px; }
  .legend{ display: flex; justify-content: center; gap: 18px; margin: 24px 0 44px; font-size: 12.5px; color: var(--text-2); flex-wrap: wrap; }
  .legend span{ display: inline-flex; align-items: center; gap: 6px; }
  .dot{ width: 8px; height: 8px; border-radius: 50%; }
  .dot.done{ background: var(--accent); }
  .dot.partial{ background: var(--warn); }
  .dot.planned{ background: var(--text-3); }

  .timeline{ position: relative; padding-left: 28px; }
  .timeline::before{ content: ''; position: absolute; left: 5px; top: 6px; bottom: 6px; width: 2px; background: var(--border); }
  .phase{ position: relative; margin-bottom: 28px; }
  .phase-dot{ position: absolute; left: -28px; top: 4px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--bg); }
  .phase-dot.done{ background: var(--accent); }
  .phase-dot.partial{ background: var(--warn); }
  .phase-dot.planned{ background: var(--text-3); }
  .phase-card{ background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-l); padding: 18px 22px; }
  .phase-head{ display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; }
  .phase-title{ display: flex; align-items: baseline; gap: 10px; }
  .phase-num{ font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
  .phase-name{ font-size: 15.5px; font-weight: 700; }
  .status-badge{ font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.04em; padding: 4px 10px; border-radius: 999px; text-transform: uppercase; flex-shrink: 0; white-space: nowrap; }
  .status-badge.done{ background: var(--accent-dim); color: var(--accent); }
  .status-badge.partial{ background: var(--warn-dim); color: var(--warn); }
  .status-badge.planned{ background: var(--bg); color: var(--text-3); border: 1px solid var(--border); }
  .chevron{ color: var(--text-3); transition: transform 0.2s ease; flex-shrink: 0; }
  .phase.open .chevron{ transform: rotate(180deg); }

  .phase-items{ list-style: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border-soft); display: none; }
  .phase.open .phase-items{ display: block; }
  .phase-items li{ display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 13.5px; color: var(--text-2); }
  .item-icon{ width: 16px; height: 16px; flex-shrink: 0; }
  .item-icon.done{ color: var(--accent); }
  .item-icon.partial{ color: var(--warn); }
  .item-icon.planned{ color: var(--text-3); }
  .item-done{ color: var(--text-1); }

  .current-flag{ display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--accent); font-family: var(--font-mono); margin-top: 8px; }
  .current-flag .dot{ background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  footer{ border-top: 1px solid var(--border-soft); padding: 30px 0; text-align: center; margin-top: 20px; }
  footer .wrap{ max-width: 1180px; }
  footer a{ color: var(--text-2); font-size: 13px; margin: 0 10px; }
</style>
</head>
<body>
  <nav class="nav"><div class="wrap"><a class="logo" href="index.html"><img src="/apple-touch-icon.png" width="20" height="20" alt="">BuildArken</a></div></nav>

  <main>
    <div class="wrap">
      <div class="doc-header">
        <h1>Roadmap</h1>
        <p>Where BuildArken is today, and where it's headed.</p>
      </div>
      <div class="legend">
        <span><span class="dot done"></span>Done</span>
        <span><span class="dot partial"></span>In progress</span>
        <span><span class="dot planned"></span>Planned</span>
      </div>

      <div class="timeline" id="timeline"></div>
    </div>
  </main>

  <footer>
    <div class="wrap">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
      <a href="cookies.html">Cookie Policy</a>
    </div>
  </footer>

  <script>
    var ICONS = {
      done: '<svg class="item-icon done" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
      partial: '<svg class="item-icon partial" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
      planned: '<svg class="item-icon planned" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9" stroke-dasharray="3 3"/></svg>'
    };

    var PHASES = [
      { n: 1, name: 'Vision & Research', status: 'done', open: false,
        items: [['Platform Vision','done'],['Market Research','done'],['Competitor Analysis','done'],['MVP Definition','done']] },
      { n: 2, name: 'Branding', status: 'done', open: false,
        items: [['BuildArken Identity','done'],['Logo','done'],['Brand Guidelines','done'],['Domain','done']] },
      { n: 3, name: 'Infrastructure', status: 'done', open: false,
        items: [['GitHub','done'],['Vercel','done'],['Namecheap','done'],['Cloudflare','done'],['Google Analytics','done'],['Google Search Console','done'],['Supabase','done']] },
      { n: 4, name: 'Authentication', status: 'done', open: false,
        items: [['Google OAuth','done'],['GitHub OAuth','done'],['Session Persistence','done'],['Profiles','done'],['Secure Authentication (RLS)','done']] },
      { n: 5, name: 'Landing & Foundation', status: 'partial', open: false,
        items: [['Landing Page Polish','done'],['Responsive Design','done'],['Explore Tools','done'],['Navigation','done'],['Policies','done'],['Language Support (6 languages)','done'],['SEO Foundation (meta tags, sitemap)','planned']] },
      { n: 6, name: 'User System', status: 'done', open: false,
        items: [['Dashboard','done'],['Profiles','done'],['Creator Accounts','done'],['Upload Tool','done'],['Edit Tool','done'],['Draft → Pending Review → Published','done'],['Favorites','done'],['Settings','done'],['Explore Published Tools','done'],['Supabase Storage','done']] },
      { n: 7, name: 'Marketplace', status: 'partial', open: true, current: true,
        items: [
          ['Tool Pages','done'],['Reviews','done'],['Ratings','done'],['Pricing (display)','done'],['Tags (display)','done'],
          ['Categories (full browsing, not just 3 buckets)','partial'],['Search (currently basic text match)','partial'],
          ['Filters (price / platform)','partial'],['Analytics (view counter only, no dashboard)','partial'],
          ['Creator Verification','planned'],['Collections','planned'],
          ['Empty buttons fixed (Docs/Creators/Roadmap/Legal)','done'],['All pages connected','partial']
        ] },
      { n: 8, name: 'Platform Completion', status: 'planned', open: false, items: [['Complete every page','planned'],['Complete every modal','planned'],['Complete every dashboard section','planned'],['Remove placeholders','planned'],['Remove fake content','planned']] },
      { n: 9, name: 'Bug Fixing', status: 'planned', open: false, items: [['Fix Bugs','planned'],['Edge Cases','planned'],['Broken Links','planned'],['Database Issues','planned'],['Auth Bugs','planned'],['Mobile Bugs','planned']] },
      { n: 10, name: 'UI / UX Overhaul', status: 'planned', open: false, items: [['Complete UI Redesign','planned'],['UX Improvements','planned'],['Better Typography','planned'],['Better Animations','planned'],['Better Cards','planned'],['Better Dashboard','planned'],['Better Marketplace','planned'],['Better Mobile Experience','planned']] },
      { n: 11, name: 'Creator Growth', status: 'planned', open: false, items: [['Creator Dashboard','planned'],['Creator Analytics','planned'],['Verification','planned'],['Featured Creators','planned']] },
      { n: 12, name: 'Monetization', status: 'planned', open: false, items: [['Premium','planned'],['Featured Listings','planned'],['Sponsored Tools','planned'],['Affiliate System','planned']] },
      { n: 13, name: 'Community', status: 'planned', open: false, items: [['Comments','planned'],['Reviews','done'],['Follow Creators','planned'],['Notifications','planned']] },
      { n: 14, name: 'Documentation', status: 'planned', open: false, items: [['Docs','planned'],['API Docs','planned'],['Developer Guide','planned']] },
      { n: 15, name: 'Security', status: 'planned', open: false, items: [['Rate Limiting','planned'],['Anti Spam','planned'],['Reports','planned'],['Admin Panel','planned']] },
      { n: 16, name: 'Performance', status: 'planned', open: false, items: [['Lighthouse 95+','planned'],['Caching','planned'],['Image Optimization','planned'],['Database Optimization','planned']] },
      { n: 17, name: 'AI Features', status: 'planned', open: false, items: [['AI Search','planned'],['AI Recommendations','planned'],['Smart Categories','planned']] },
      { n: 18, name: 'Launch', status: 'planned', open: false, items: [['Closed Alpha','planned'],['Open Beta','planned'],['Public Launch','planned']] },
      { n: 19, name: 'Scale', status: 'planned', open: false, items: [['Partnerships','planned'],['Team Expansion','planned'],['Funding (Optional)','planned'],['Thousands of Tools','planned'],['Tens of Thousands of Users','planned']] }
    ];

    var timeline = document.getElementById('timeline');
    PHASES.forEach(function(p){
      var el = document.createElement('div');
      el.className = 'phase' + (p.open ? ' open' : '');
      el.innerHTML =
        '<div class="phase-dot ' + p.status + '"></div>' +
        '<div class="phase-card">' +
          '<div class="phase-head">' +
            '<div class="phase-title"><span class="phase-num">PHASE ' + p.n + '</span><span class="phase-name">' + p.name + '</span></div>' +
            '<div style="display:flex;align-items:center;gap:10px;">' +
              '<span class="status-badge ' + p.status + '">' + p.status + '</span>' +
              '<svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' +
            '</div>' +
          '</div>' +
          (p.current ? '<div class="current-flag"><span class="dot"></span>YOU ARE HERE</div>' : '') +
          '<ul class="phase-items">' + p.items.map(function(item){
            return '<li>' + ICONS[item[1]] + '<span class="' + (item[1] === 'done' ? 'item-done' : '') + '">' + item[0] + '</span></li>';
          }).join('') + '</ul>' +
        '</div>';
      el.querySelector('.phase-head').addEventListener('click', function(){
        el.classList.toggle('open');
      });
      timeline.appendChild(el);
    });
  </script>
</body>
</html>
